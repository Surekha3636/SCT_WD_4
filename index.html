<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do App</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 15px;
    }

    input, button {
        padding: 8px;
        margin: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        background: #ff6f91;
        color: white;
        cursor: pointer;
        border: none;
    }

    button:hover {
        background: #ff4f7a;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 15px;
        max-height: 200px;
        overflow-y: auto;
    }

    li {
        background: #f1f1f1;
        padding: 10px;
        margin: 5px 0;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }

    .completed {
        text-decoration: line-through;
        color: gray;
    }

    .task-actions {
        margin-top: 5px;
    }

    .task-actions button {
        margin-right: 5px;
        padding: 5px 8px;
        font-size: 12px;
    }

    .datetime {
        font-size: 12px;
        color: #555;
    }
</style>

</head>
<body>

<div class="container">
    <h2>📝 To-Do App</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <input type="datetime-local" id="taskDateTime">
    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>
</div>

<script>

function addTask() {
    const taskInput = document.getElementById("taskInput");
    const dateTimeInput = document.getElementById("taskDateTime");

    const taskText = taskInput.value.trim();
    const taskDateTime = dateTimeInput.value;

    if (taskText === "") {
        alert("Please enter a task!");
        return;
    }

    const li = document.createElement("li");

    const taskSpan = document.createElement("span");
    taskSpan.innerText = taskText;

    const dateSpan = document.createElement("div");
    dateSpan.className = "datetime";
    dateSpan.innerText = taskDateTime ? "📅 " + taskDateTime : "";

    const actions = document.createElement("div");
    actions.className = "task-actions";

    // ✅ Complete Button
    const completeBtn = document.createElement("button");
    completeBtn.innerText = "✔";
    completeBtn.onclick = () => {
        taskSpan.classList.toggle("completed");
    };

    // ✅ Edit Button
    const editBtn = document.createElement("button");
    editBtn.innerText = "✏";
    editBtn.onclick = () => {
        const newTask = prompt("Edit your task:", taskSpan.innerText);
        if (newTask) taskSpan.innerText = newTask;
    };

    // ✅ Delete Button
    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "🗑";
    deleteBtn.onclick = () => {
        li.remove();
    };

    actions.appendChild(completeBtn);
    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);

    li.appendChild(taskSpan);
    li.appendChild(dateSpan);
    li.appendChild(actions);

    document.getElementById("taskList").appendChild(li);

    taskInput.value = "";
    dateTimeInput.value = "";
}

</script>

</body>
</html>
